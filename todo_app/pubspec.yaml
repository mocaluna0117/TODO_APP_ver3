# Flutter（Dart）のアプリ設定・依存管理ファイル(yamlだけど、dockerとは全く関係ない)

name: todo_app # アプリの名前
description: "todo app by flutter for frontend" # アプリの説明
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
# 1.0.0 → ユーザー向けバージョン +1 → ビルド番号（内部用）
version: 1.0.0+1
# Dartのバージョン指定
environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter # Flutter本体
  flutter_localizations:
    sdk: flutter # 日本語対応
  cupertino_icons: ^1.0.8 # iOS風アイコン
  intl: ^0.20.2 # 日付フォーマット
  flutter_local_notifications: ^21.0.0 # ローカル通知
  timezone: ^0.11.0 # 通知のスケジュール用
  shared_preferences: ^2.5.5
  image_picker: ^1.2.1
  share_plus: ^13.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"

flutter_native_splash:
  color: "#F5F5FA"
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    icon_background_color: "#F5F5FA"


flutter: # Flutterエンジンに対する設定を書く場所
  config:
    enable-swift-package-manager: false
  uses-material-design: true # Material Icons（Googleのアイコン）を使えるようにする(Icons.home みたいなのが使える)
  # flutterでは以下のように書かないと、ディレクトリにファイルを置いても、ファイルを読み込むことはない
